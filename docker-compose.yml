services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nursery
      POSTGRES_PASSWORD: nursery
      POSTGRES_DB: nursery_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nursery -d nursery_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
